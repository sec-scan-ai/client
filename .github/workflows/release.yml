name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X github.com/sec-scan-ai/client/cmd.Version=${VERSION} -X github.com/sec-scan-ai/client/cmd.BuildTime=${BUILD_TIME}"

          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o sec-scan-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o sec-scan-darwin-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o sec-scan-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o sec-scan-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o sec-scan-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/sec-scan-ai/client/main/install.sh | sh
            ```

            **Windows:** Download `sec-scan-windows-amd64.exe` below and add it to your PATH.

            ## Changes
          files: |
            sec-scan-darwin-arm64
            sec-scan-darwin-amd64
            sec-scan-linux-amd64
            sec-scan-linux-arm64
            sec-scan-windows-amd64.exe
